<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoBot | RAG</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body class="dark">
  <div class="snowfall"></div>

  <div class="chat-app">
    <!-- Chat Area -->
    <main class="main-content">
      <div class="chat-viewport" id="responseContainer">
        <div class="welcome-center">
          <h2>How can I help you today?</h2>
          <p>Ask me anything, I'll search your documents for answers.</p>
        </div>
      </div>

      <!-- Input -->
      <div class="input-container">
        <div class="input-inner">
          <div class="example-chips" id="exampleChips"></div>
          <div class="search-bar">
            <input type="text" id="queryInput" placeholder="Ask NeoBot anything..." autocomplete="off" />
            <button id="askButton" class="send-btn">
              <i class="fas fa-arrow-up"></i>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/script.js"></script>
</body>

</html>
